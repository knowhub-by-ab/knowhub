name: Generate signing keystore

# One-time helper: creates the Android release keystore (so you don't need Java
# installed locally), prints its SHA-1 / SHA-256 (add these to Firebase), and
# uploads the keystore file as a downloadable artifact.
#
# Before running: set the repo secret ANDROID_KEYSTORE_PASSWORD (Settings ->
# Secrets and variables -> Actions). Then run this workflow from the Actions tab.

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate keystore
        env:
          PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$PW" ]; then
            echo "::error::Set the repo secret ANDROID_KEYSTORE_PASSWORD first, then re-run."
            exit 1
          fi
          keytool -genkeypair -v \
            -keystore knowhub-release.jks \
            -alias knowhub \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PW" -keypass "$PW" \
            -dname "CN=KnowHub, OU=KnowHub, O=KnowHub, L=NA, ST=NA, C=NA"
          echo ""
          echo "================ ADD THESE TO FIREBASE (Android app fingerprints) ================"
          keytool -list -v -keystore knowhub-release.jks -alias knowhub -storepass "$PW" \
            | grep -E "SHA1:|SHA256:"
          echo "=================================================================================="

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowhub-release-keystore
          path: knowhub-release.jks
          retention-days: 7
