name: Android APK

# Builds the KnowHub Android APK (Capacitor) and, on a version tag, attaches it
# to a GitHub Release. Run manually from the Actions tab, or push a tag like v0.1.0.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        working-directory: apps/web
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: apps/web
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp apps/web/android/app/build/outputs/apk/debug/app-debug.apk knowhub.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowhub-apk
          path: knowhub.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: knowhub.apk
