name: Android APK

# Builds the KnowHub Android APK (Capacitor). Produces a downloadable artifact,
# and on a version tag attaches the APK to a GitHub Release.
#
# Behaviour scales with the repo secrets you set (see docs/MANUAL_STEPS.md F):
#   - GOOGLE_SERVICES_JSON (base64)  -> enables native Google sign-in
#   - ANDROID_KEYSTORE_BASE64 + ANDROID_KEYSTORE_PASSWORD + ANDROID_KEY_ALIAS +
#     ANDROID_KEY_PASSWORD             -> builds a SIGNED release APK
# With no secrets it still builds an (unsigned) debug APK with the proper icon.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        working-directory: apps/web
        run: npx cap add android

      - name: Generate app icon (matches the web logo)
        working-directory: apps/web
        run: |
          npm i -D sharp @capacitor/assets
          node scripts/gen-icon.mjs
          npx @capacitor/assets generate --android

      - name: Configure, sync and build APK
        working-directory: apps/web
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash scripts/android-build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowhub-apk
          path: knowhub.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: knowhub.apk
