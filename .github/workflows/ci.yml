name: CI

# Type-checks, lints and builds the web app on every push / PR so broken code is
# caught before Cloudflare Pages deploys it.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build (type-check + bundle)
        run: npm run build
