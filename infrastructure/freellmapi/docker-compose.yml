# FreeLLMAPI + Caddy (automatic HTTPS) for an Oracle Cloud Always-Free VM.
# Runs the published FreeLLMAPI image behind Caddy, which fetches a free
# Let's Encrypt certificate for your DuckDNS domain so KnowHub (https) can
# call it. See docs/DEPLOY_FREELLMAPI_ORACLE.md for full instructions.

services:
  freellmapi:
    image: ghcr.io/tashfeenahmed/freellmapi:latest
    restart: unless-stopped
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORT=3001
      - HOST_BIND=0.0.0.0
      - DASHBOARD_ORIGINS=${DASHBOARD_ORIGINS}
    volumes:
      - freellmapi-data:/app/server/data
    expose:
      - "3001"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - freellmapi
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  freellmapi-data:
  caddy-data:
  caddy-config:
